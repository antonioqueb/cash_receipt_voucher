<?xml version="1.0" encoding="UTF-8"?>
<svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cashBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="cashShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0b2a5b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fondo redondeado con gradiente azul -->
  <rect x="0" y="0" width="140" height="140" rx="34" fill="url(#cashBg)"/>
  <circle cx="116" cy="22" r="46" fill="#ffffff" opacity="0.08"/>

  <!-- Billete -->
  <g filter="url(#cashShadow)">
    <rect x="24" y="44" width="92" height="56" rx="9" fill="#ffffff"/>
    <rect x="24" y="44" width="92" height="56" rx="9" fill="none" stroke="#dbe6fb" stroke-width="1.5"/>
    <circle cx="38" cy="58" r="3" fill="#bcd2f5"/>
    <circle cx="102" cy="86" r="3" fill="#bcd2f5"/>
    <circle cx="70" cy="72" r="17" fill="#eaf2ff"/>
    <circle cx="70" cy="72" r="17" fill="none" stroke="#2563eb" stroke-width="2"/>
    <text x="70" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="22" font-weight="800" fill="#1e3a8a">$</text>
  </g>

  <!-- Billetes apilados (caja chica) -->
  <rect x="30" y="106" width="62" height="7" rx="3.5" fill="#ffffff" opacity="0.55"/>
  <rect x="30" y="116" width="40" height="6" rx="3" fill="#ffffff" opacity="0.32"/>
</svg>
